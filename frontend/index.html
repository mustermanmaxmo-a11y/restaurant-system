<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <title>Restaurant Bestellung</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body {
      background: #0b132b;
      color: white;
      font-family: Arial;
      text-align: center;
      padding-top: 50px;
    }

    button {
      background: #22c55e;
      border: none;
      padding: 20px;
      font-size: 20px;
      border-radius: 10px;
      cursor: pointer;
    }
  </style>
</head>

<body>

  <h1>🍽️ Restaurant Bestellung</h1>

  <button onclick="createOrder()">🍕 Bestellung abschicken</button>

  <p id="status">Status: Noch keine Bestellung</p>

  <script>
    const { createClient } = supabase;

    const supabaseClient = createClient(
      "https://qkzftuweimyouklzlfes.supabase.co",
      "sb_publishable_OZ-ENgPtw1sj5Yal-K1mpw_VrYGQOXi"
    );

    async function createOrder() {
      console.log("Sende Bestellung...");

      const { data, error } = await supabaseClient
        .from("orders")
        .insert([
          {
            restaurant_id: "1",
            table_num: 5,
            items: { pizza: 1 },
            status: "neu"
          }
        ]);

      if (error) {
        console.error("FEHLER:", error);
        document.getElementById("status").innerText = "❌ Fehler!";
      } else {
        console.log("Erfolg:", data);
        document.getElementById("status").innerText = "✅ Bestellung gesendet!";
      }
    }
  </script>

</body>
</html>
