<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Restaurant Bestellung</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      text-align: center;
      padding-top: 100px;
    }

    button {
      padding: 20px 40px;
      font-size: 20px;
      background: #22c55e;
      border: none;
      border-radius: 12px;
      cursor: pointer;
    }

    button:hover {
      background: #16a34a;
    }

    #status {
      margin-top: 20px;
    }
  </style>
</head>
<body>

  <h1>🍽️ Restaurant Bestellung</h1>

  <button onclick="createOrder()">🍕 Bestellung abschicken</button>

  <p id="status">Status: Noch keine Bestellung</p>

  <script>
    // 🔑 DEINE DATEN HIER EINSETZEN
    const supabaseUrl = "https://qkzftuweimyouklzlfes.supabase.co";
    const supabaseKey = "sb_publishable_OZ-ENgPtw1sj5Yal-K1mpw_VrYGQOXi";

    const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

    async function createOrder() {
      document.getElementById("status").innerText = "Sende Bestellung...";

      const { data, error } = await supabase
        .from("orders")
        .insert([
          {
            restaurant_id: "rest1",
            table_num: 7,
            items: [
              { name: "Pizza", qty: 1 }
            ],
            status: "new"
          }
        ]);

      if (error) {
        console.error("FEHLER:", error);
        document.getElementById("status").innerText = "❌ Fehler!";
      } else {
        console.log("SUCCESS:", data);
        document.getElementById("status").innerText = "✅ Bestellung erfolgreich!";
      }
    }
  </script>

</body>
</html>
